<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="A fast, searchable Pokedex build with ReactJS"
    />
    <style>
      html { background-color: #fff; } 
      html[data-theme='dark'] { background-color: #1a1a1a; }
    </style>
    <title>Pokedex</title>
    <link rel="preload" as="image" href="%PUBLIC_URL%/images/pokeapi.webp" fetchpriority="high" media="(min-width: 768px)">
    <link rel="preload" href="%PUBLIC_URL%/fonts/Oswald-Bold.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="%PUBLIC_URL%/fonts/Oswald-Light.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="%PUBLIC_URL%/fonts/Oswald-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <style>
      @font-face {
        font-family: "Oswald";
        src: url("%PUBLIC_URL%/fonts/Oswald-Light.woff2") format("woff2");
        font-weight: 300;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Oswald";
        src: url("%PUBLIC_URL%/fonts/Oswald-Regular.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Oswald";
        src: url("%PUBLIC_URL%/fonts/Oswald-Bold.woff2") format("woff2");
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }
    </style>
    <link 
      rel="preload" 
      as="image" 
      href="https://wsrv.nl/?url=raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png&output=webp&q=80" 
      fetchpriority="high"
    >
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <script>
      (function() {
        const savedTheme = localStorage.getItem('pokedex-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
      })();
    </script>
    <main id="root"></main>
  </body>
</html>
